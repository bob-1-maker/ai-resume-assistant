<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word文件解析测试</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
    <h1>Word文件解析测试</h1>
    <input type="file" id="fileInput" accept=".doc,.docx">
    <button onclick="testWordParse()">解析文件</button>
    <div id="result"></div>

    <script>
        async function testWordParse() {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            const file = fileInput.files[0];
            
            if (!file) {
                resultDiv.innerHTML = '<p>请选择一个Word文件</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p>正在解析文件...</p>';
            
            try {
                const text = await parseWordToText(file);
                resultDiv.innerHTML = `<p>解析成功！</p><pre>${text}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<p>解析失败: ${error.message}</p>`;
                console.error('解析失败:', error);
            }
        }

        async function parseWordToText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = async (e) => {
                    try {
                        const arrayBuffer = e.target.result;
                        
                        // 使用JSZip解析Word文件（.docx是ZIP格式）
                        const zip = await JSZip.loadAsync(arrayBuffer);
                        
                        // 尝试从主要的文档XML文件中提取文本
                        let text = '';
                        
                        // 检查是否存在word/document.xml文件
                        if (zip.files['word/document.xml']) {
                            const documentXml = await zip.files['word/document.xml'].async('text');
                            text = extractTextFromXML(documentXml);
                        }
                        
                        // 如果没有找到document.xml，尝试从其他XML文件中提取
                        if (!text) {
                            for (const [path, file] of Object.entries(zip.files)) {
                                if (path.endsWith('.xml') && !path.includes('_rels') && !path.includes('theme')) {
                                    try {
                                        const xmlContent = await file.async('text');
                                        const extractedText = extractTextFromXML(xmlContent);
                                        if (extractedText) {
                                            text += extractedText + '\n';
                                        }
                                    } catch (err) {
                                        console.warn('解析XML文件失败:', path, err);
                                    }
                                }
                            }
                        }
                        
                        // 如果文本仍然为空，尝试使用传统方法
                        if (!text) {
                            const uint8Array = new Uint8Array(arrayBuffer);
                            const decoder = new TextDecoder('utf-8', { fatal: false });
                            let rawText = decoder.decode(uint8Array);
                            text = extractTextFromXML(rawText);
                        }
                        
                        if (!text.trim()) {
                            reject(new Error('无法从 Word 文档中提取文本'));
                            return;
                        }
                        
                        resolve(text.trim());
                    } catch (error) {
                        console.error('Word 解析错误:', error);
                        reject(new Error('Word 解析失败: ' + error.message));
                    }
                };
                
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsArrayBuffer(file);
            });
        }

        function extractTextFromXML(xml) {
            // 移除XML标签
            let text = xml
                .replace(/<[^>]+>/g, ' ')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&amp;/g, '&')
                .replace(/&quot;/g, '"')
                .replace(/&apos;/g, "'")
                .replace(/\s+/g, ' ')
                .trim();
            return text;
        }
    </script>
</body>
</html>
